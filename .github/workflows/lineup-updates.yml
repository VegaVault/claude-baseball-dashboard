name: Lineup Updates

on:
  schedule:
    # Every 15 min during game hours: 11am–midnight ET (15:00–04:00 UTC)
    - cron: "*/15 15-23 * * *"
    - cron: "*/15 0-4 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write  # needed to commit data/ back to repo

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update lineups
        run: python -m src.build.lineup_update

      - name: Send Discord notifications
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m src.notify.discord
        continue-on-error: true  # don't fail the job if Discord isn't wired yet

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet \
            && echo "No changes to commit." \
            || (git commit -m "lineups: $(date -u +%Y-%m-%dT%H:%MZ)" && git push)
